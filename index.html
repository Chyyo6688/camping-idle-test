<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Camping Idle V2.8</title>
  <script>
    window.APP_VERSION = "2.8";
  </script>
  <link id="appStylesheet" rel="stylesheet" href="style.css?v=2.8">
  <script>
    document.getElementById("appStylesheet").href = "style.css?v=" + window.APP_VERSION;
  </script>
</head>
<body class="day">
  <main class="game-app">
    <div class="game-shell">
      <div class="game-viewport">
        <section id="campScene" class="camp-scene game-world" aria-label="Cozy camping scene">
      <div id="sceneContent" class="scene-content">
      <img id="sceneBackground" class="scene-asset scene-background" src="assets/backgrounds/campsite_day.png?v=2.8" alt="">
      <img id="treelineImage" class="scene-asset treeline-image" src="assets/backgrounds/treeline_day.png?v=2.8" alt="">
      <img id="lakeImage" class="scene-asset lake-image" src="assets/backgrounds/lake_day.png?v=2.8" alt="">

      <div id="woodLayer" class="wood-layer" aria-label="Fallen branches on the ground"></div>
      <div id="sparkLayer" class="spark-layer" aria-hidden="true"></div>
      <div id="gearLayer" class="gear-layer-root" aria-label="Camp gear"></div>

      <div id="campfire" class="campfire asset-object level-1" aria-label="Campfire">
        <img id="fireGlowImage" class="object-image fire-glow-img" src="assets/campfire/glow_fire.png?v=2.8" alt="">
        <img id="campfireBaseImage" class="object-image" src="assets/campfire/campfire_lv1_base.png?v=2.8" alt="">
        <img id="campfireFlameImage" class="object-image campfire-flame-img" src="assets/campfire/campfire_lv1_flame_01.png?v=2.8" alt="">
      </div>

      <div id="camper" class="camper asset-object" role="img" aria-label="Camper"></div>
      <div id="camperThoughtBubble" class="camper-thought" aria-live="polite"></div>
      </div>

      <header class="top-bar" aria-label="Camp resources">
        <div id="cozyPointStatus" class="resource-pill cozy-chip">
          <img class="resource-icon" src="assets/ui/icon_cozy.png?v=2.8" alt="">
          <span class="resource-copy">
            <span class="resource-label">Cozy Points</span>
            <strong id="cozyPointsAmount">0</strong>
          </span>
          <span id="cozyGainLayer" class="gain-layer" aria-live="polite"></span>
        </div>

        <div class="resource-pill comfort-chip">
          <img class="resource-icon" src="assets/ui/icon_comfort.png?v=2.8" alt="">
          <span class="resource-copy">
            <span class="resource-label">Comfort</span>
            <strong id="comfortAmount">0</strong>
          </span>
        </div>

        <div class="resource-pill warmth-chip">
          <img class="resource-icon" src="assets/ui/icon_warmth.png?v=2.8" alt="">
          <span class="resource-copy">
            <span class="resource-label">Warmth</span>
            <strong><span id="warmthSecondsAmount">0</span>s</strong>
          </span>
        </div>
      </header>

      <nav class="mode-controls" aria-label="Camp mode controls">
        <button id="gatherWoodToggle" class="mode-button gather-button active" type="button">
          <img class="button-icon" src="assets/ui/icon_gather_wood.png?v=2.8" alt="">
          <span>Gather</span>
          <strong id="gatherModeLabel">On</strong>
        </button>

        <button id="dayNightToggle" class="mode-button hidden" type="button">
          <img id="dayNightIcon" class="button-icon" src="assets/ui/icon_night.png?v=2.8" alt="">
          <span id="dayNightLabel">Night</span>
        </button>
      </nav>

      <nav class="utility-controls" aria-label="Save and help controls">
        <button id="onboardingHelpButton" class="utility-button help-button" type="button" aria-label="Open guide">
          <span class="help-mark">?</span>
          <span>Help</span>
        </button>

        <button id="camperProfileButton" class="utility-button camper-profile-toggle" type="button" aria-label="Edit camper profile">
          <span>Camper</span>
        </button>

        <button id="resetSaveButton" class="utility-button" type="button">
          <img class="button-icon" src="assets/ui/icon_tools.png?v=2.8" alt="">
          <span>Reset</span>
        </button>
      </nav>

      <nav class="ui-display-controls" aria-label="Display controls">
        <button id="uiDisplayToggle" class="utility-button ui-toggle-button" type="button" aria-label="Toggle UI display">
          <span id="uiDisplayLabel">UI</span>
        </button>
      </nav>

      <div class="toast-layer" aria-live="polite">
        <p id="welcomeMessage" class="toast-message welcome-message"></p>
        <p id="statusLine" class="toast-message status-line"></p>
      </div>
      <p id="camperStateText" class="camper-state">Wandering around camp</p>

      <nav class="floating-controls" aria-label="Camp controls">
        <button id="buildModeToggle" class="floating-button build-mode-toggle hidden" type="button" aria-pressed="false" aria-label="Enter Build Mode">
          <img class="button-icon" src="assets/ui/icon_tools.png?v=2.8" alt="">
          <span id="buildModeLabel">Build</span>
        </button>
        <button id="shopToggle" class="floating-button" type="button">
          <img class="button-icon" src="assets/ui/icon_shop.png?v=2.8" alt="">
          <span>Shop</span>
        </button>
      </nav>
        </section>

        <button id="shopBackdrop" class="shop-backdrop" type="button" aria-label="Close shop"></button>

        <aside id="shopDrawer" class="shop-drawer" aria-label="Camp shop" aria-hidden="true">
      <div class="drawer-header">
        <div>
          <p class="eyebrow">Camp Gear</p>
          <h1>Shop</h1>
        </div>
        <button id="closeShopButton" class="close-button" type="button" aria-label="Close shop">
          <img src="assets/ui/icon_close.png?v=2.8" alt="">
        </button>
      </div>

      <nav id="shopTabs" class="shop-tabs" aria-label="Shop categories"></nav>

      <div id="shopContent" class="shop-content"></div>

      <section class="drawer-summary" aria-label="Camp summary">
        <p>Fire Lv <strong id="campfireLevelAmount">1</strong></p>
        <p><strong id="cozyRateAmount">0</strong> CP/s</p>
        <p>Offline <strong id="offlineCapAmount">30 min</strong></p>
      </section>
        </aside>

        <div id="onboardingLayer" class="onboarding-layer hidden" aria-hidden="true" aria-live="polite">
          <div id="onboardingPointer" class="onboarding-pointer" aria-hidden="true"></div>
          <section id="onboardingPanel" class="onboarding-panel" aria-label="New player guide">
            <p id="onboardingStepLabel" class="onboarding-step-label"></p>
            <h2 id="onboardingTitle"></h2>
            <p id="onboardingBody"></p>
            <div class="onboarding-actions">
              <button id="onboardingSkipButton" class="onboarding-button secondary" type="button">Skip</button>
              <button id="onboardingPrimaryButton" class="onboarding-button primary" type="button">Next</button>
            </div>
          </section>
        </div>

        <div id="camperProfileLayer" class="camper-profile-layer hidden" aria-hidden="true" aria-live="polite">
          <section id="camperProfilePanel" class="camper-profile-panel" aria-label="Create camper">
            <p id="camperProfileStepLabel" class="camper-profile-step-label"></p>
            <h2 id="camperProfileTitle"></h2>
            <p id="camperProfileBody"></p>

            <div id="camperNameStep" class="camper-profile-name-step">
              <label for="camperNameInput">Camper name</label>
              <input id="camperNameInput" class="camper-name-input" type="text" maxlength="18" autocomplete="off" placeholder="Moss" />
            </div>

            <div id="camperAppearanceStep" class="camper-appearance-step hidden">
              <div id="camperAppearancePreview" class="camper-appearance-preview" role="img" aria-label="Camper preview"></div>
              <div id="camperAppearanceControls" class="camper-appearance-controls"></div>
            </div>

            <div id="camperQuestionStep" class="camper-question-step hidden">
              <p id="camperQuestionText" class="camper-question-text"></p>
              <div id="camperQuestionOptions" class="camper-question-options"></div>
            </div>

            <div id="camperResultStep" class="camper-result-step hidden">
              <div class="camper-card">
                <div id="camperCardPortrait" class="camper-card-portrait" role="img" aria-label="Camper portrait">
                  <img id="camperCardBackground" class="camper-card-background" src="assets/backgrounds/camper-card/slowMood.png?v=2.8" alt="">
                  <div id="camperCardCamper" class="camper-card-camper" aria-hidden="true"></div>
                </div>

                <div class="camper-card-info">
                  <button id="camperCardCloseButton" class="camper-card-close" type="button" aria-label="Close camper card">×</button>

                  <div class="camper-card-field">
                    <p class="camper-card-label">昵称</p>
                    <div class="camper-card-edit-row">
                      <h3 id="camperResultName" class="camper-card-name"></h3>
                      <input id="camperNameEditInput" class="camper-card-inline-input camper-card-name-input hidden" type="text" maxlength="18" autocomplete="off" />
                      <button id="camperNameEditButton" class="camper-card-edit-button" type="button" aria-label="Edit nickname" title="Edit nickname">✎</button>
                    </div>
                  </div>

                  <div class="camper-card-field">
                    <p class="camper-card-label">性格</p>
                    <h4 id="camperResultTitle" class="camper-card-personality"></h4>
                    <p id="camperResultDescription" class="camper-card-description"></p>
                  </div>

                  <div class="camper-card-field">
                    <p class="camper-card-label">口头禅</p>
                    <div class="camper-card-edit-row">
                      <p id="camperCatchphraseText" class="camper-card-catchphrase"></p>
                      <input id="camperCatchphraseEditInput" class="camper-card-inline-input hidden" type="text" maxlength="42" autocomplete="off" />
                      <button id="camperCatchphraseEditButton" class="camper-card-edit-button" type="button" aria-label="Edit catchphrase" title="Edit catchphrase">✎</button>
                    </div>
                  </div>

                  <div class="camper-card-actions">
                    <button id="camperRetakeQuizButton" class="camper-profile-button secondary" type="button">重新答题</button>
                    <button id="camperRecustomizeButton" class="camper-profile-button primary" type="button">重新捏脸</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="camper-profile-actions">
              <button id="camperProfileSecondaryButton" class="camper-profile-button secondary" type="button">Random camper</button>
              <button id="camperProfilePrimaryButton" class="camper-profile-button primary" type="button">Start</button>
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function() {
      const versionedImages = document.querySelectorAll('img[src^="assets/"]');

      versionedImages.forEach(function(image) {
        const cleanPath = image.getAttribute("src").split("?")[0];
        image.src = cleanPath + "?v=" + window.APP_VERSION;
      });

      function loadGameScript() {
        const gameScript = document.createElement("script");
        gameScript.src = "game.js?v=" + window.APP_VERSION;
        document.body.appendChild(gameScript);
      }

      const gearCatalogScript = document.createElement("script");
      gearCatalogScript.src = "gearCatalog.js?v=" + window.APP_VERSION;
      gearCatalogScript.onload = loadGameScript;
      gearCatalogScript.onerror = loadGameScript;
      document.body.appendChild(gearCatalogScript);
    })();
  </script>
</body>
</html>

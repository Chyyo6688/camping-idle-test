<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BetaBreezeTent Preview v3</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f3f0e8;
      color: #241f18;
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: #fffaf0;
      border: 1px solid #d8ccba;
      border-radius: 8px;
      padding: 14px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .checker {
      min-height: 360px;
      display: grid;
      place-items: center;
      padding: 16px;
      background:
        linear-gradient(45deg, #ded7c8 25%, transparent 25%),
        linear-gradient(-45deg, #ded7c8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ded7c8 75%),
        linear-gradient(-45deg, transparent 75%, #ded7c8 75%);
      background-color: #f8f4eb;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
      border: 1px solid #d8ccba;
      border-radius: 6px;
    }

    img {
      max-width: 100%;
      max-height: 520px;
    }

    .meta {
      margin-top: 10px;
      color: #635949;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>BetaBreezeTent Preview v3</h1>
  <div class="row">
    <section class="panel">
      <h2>Reference: alpha breeze.png</h2>
      <div class="checker">
        <img src="BetaBreezeTent-alpha-breeze-reference.png" alt="Alpha breeze reference">
      </div>
      <div class="meta">Strict design reference from user.</div>
    </section>

    <section class="panel">
      <h2>Preview v3: 810x534</h2>
      <div class="checker">
        <img src="BetaBreezeTent-preview-v3-3x.png" alt="BetaBreezeTent preview v3">
      </div>
      <div class="meta">Transparent PNG preview only; not written to formal icon files.</div>
    </section>
  </div>
</body>
</html>
